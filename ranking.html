<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플레이어 랭킹 | Min. At. Zero Web Client</title>
  <meta name="description" content="Min. At. Zero 플레이어 랭킹 및 전투 통계">
  <meta name="theme-color" content="#22c55e">
  <link rel="icon" type="image/png" href="asset/image/icon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="asset/style.css">
  <style>
    /* ── PAGE HERO ── */
    .page-hero {
      padding: 44px 0 32px;
    }

    .page-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s 0.12s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    .page-title span {
      color: var(--green);
    }

    .page-desc {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.75;
      margin-top: 14px;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    /* ── SEARCH ── */
    .search-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .search-input-wrap {
      position: relative;
      flex: 1;
      max-width: 480px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      color: var(--text-dim);
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px 11px 42px;
      color: var(--text-primary);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: var(--green-border);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.08);
    }

    .search-input::placeholder {
      color: var(--text-dim);
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: none;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .search-clear:hover {
      color: var(--text-primary);
    }

    .search-clear.visible {
      display: block;
    }

    .search-btn {
      padding: 11px 22px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.2);
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
    }

    .search-btn:active {
      transform: scale(0.96) !important;
    }

    /* ── PLAYER CARD ── */
    .player-card {
      display: none;
      margin-bottom: 24px;
    }

    .player-card.visible {
      display: block;
      animation: fadeSlideIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(-14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .player-card-inner {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .player-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .player-avatar {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      image-rendering: pixelated;
      border: 2px solid var(--green-border);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .player-card:hover .player-avatar {
      transform: scale(1.06) translateY(-3px);
      border-color: var(--green);
    }

    .player-rank-badge {
      position: absolute;
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.4);
    }

    .player-info {
      flex: 0 0 auto;
      min-width: 140px;
    }

    .player-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 6px;
    }

    .player-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-cr {
      font-family: var(--mono);
      font-size: 12px;
      color: #fbbf24;
      letter-spacing: 1px;
    }

    .player-winrate {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      letter-spacing: 1px;
    }

    .player-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 10px;
      flex: 1;
      min-width: 280px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .stat-box:hover {
      border-color: var(--green-border);
      background: var(--green-glow);
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-value.kda-val {
      color: var(--green);
    }

    .stat-value.cr-val {
      color: #fbbf24;
    }

    .stat-value.wr-val {
      color: #60a5fa;
    }

    .player-not-found {
      display: none;
      text-align: center;
      padding: 18px 20px;
      margin-bottom: 20px;
      color: var(--text-dim);
      font-family: 'Noto Sans KR', var(--mono);
      font-size: 13px;
      background: rgba(239, 68, 68, 0.04);
      border: 1px solid rgba(239, 68, 68, 0.12);
      border-radius: 10px;
    }

    .player-not-found.visible {
      display: block;
    }

    /* ── LEADERBOARD ── */
    .lb-section {
      margin-top: 0;
    }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .lb-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lb-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .lb-updated {
      font-family: 'Noto Sans KR', var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0;
    }

    .lb-count-badge {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      background: var(--green-glow);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .lb-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lb-refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .lb-refresh-btn:hover:not(:disabled) {
      border-color: var(--green-border);
      color: var(--green);
      background: var(--green-glow);
    }

    .lb-refresh-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .lb-refresh-btn.spinning .refresh-icon {
      animation: spinAnim 0.8s linear infinite;
    }

    @keyframes spinAnim {
      to {
        transform: rotate(360deg);
      }
    }

    .refresh-icon {
      display: inline-block;
    }

    .lb-tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .lb-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .lb-tab:hover {
      border-color: var(--green-border);
      color: var(--green);
      background: var(--green-glow);
    }

    .lb-tab.active {
      border-color: rgba(251, 191, 36, 0.4);
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.07);
    }

    .tab-icon {
      font-size: 13px;
    }

    /* ── TABLE ── */
    .lb-table-wrap {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
    }

    .lb-table th {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .lb-table th.col-val {
      text-align: right;
    }

    .lb-table td {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.025);
      font-size: 13px;
      color: var(--text-muted);
      vertical-align: middle;
    }

    .lb-table tr:last-child td {
      border-bottom: none;
    }

    .lb-table tr[data-player] {
      cursor: pointer;
      transition: background 0.15s;
    }

    .lb-table tr[data-player]:hover td {
      background: rgba(255, 255, 255, 0.025);
    }

    .lb-table td.col-rank {
      width: 52px;
    }

    .lb-table td.col-val {
      text-align: right;
      font-family: var(--mono);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
    }

    .rank-pos {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      width: 28px;
      display: inline-block;
      text-align: center;
    }

    .rank-medal {
      font-size: 17px;
      width: 28px;
      display: inline-block;
      text-align: center;
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-cell img {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      image-rendering: pixelated;
      border: 1px solid var(--border);
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    .lb-table tr:hover .player-cell img {
      border-color: var(--green-border);
    }

    .player-cell-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .player-cell-name.is-searched {
      color: var(--green);
    }

    tr.row-highlighted td {
      background: rgba(34, 197, 94, 0.05) !important;
    }

    tr.row-highlighted td:first-child {
      box-shadow: inset 2px 0 0 var(--green);
    }

    /* ── EMPTY / ERROR / SKELETON ── */
    .lb-empty {
      padding: 52px 20px;
      text-align: center;
    }

    .lb-empty-icon {
      font-size: 34px;
      display: block;
      margin-bottom: 12px;
    }

    .lb-empty-text {
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .lb-empty-sub {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.7;
    }

    .skeleton-cell {
      height: 18px;
      border-radius: 4px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .search-wrap {
        flex-direction: column;
      }

      .search-input-wrap {
        max-width: 100%;
      }

      .player-stats-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .lb-tab {
        font-size: 11px;
        padding: 6px 9px;
      }

      .lb-table th,
      .lb-table td {
        padding: 10px 10px;
      }
    }

    @media (max-width: 480px) {
      .player-card-inner {
        gap: 16px;
      }

      .player-stats-grid {
        min-width: 100%;
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ════════════════════════════════════════
       ✨ 추가된 시각적 요소
    ════════════════════════════════════════ */

    /* 히어로 타이틀 진입 애니메이션 */
    .page-hero {
      animation: heroIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    @keyframes heroIn {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 검색 영역 진입 */
    .search-wrap {
      animation: heroIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.1s both;
    }

    /* 검색창 스캔라인 포커스 효과 */
    .search-input-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.04) 0%, transparent 60%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .search-input:focus~.search-input-wrap::after,
    .search-input-wrap:focus-within::after {
      opacity: 1;
    }

    /* 검색 버튼 shimmer */
    .search-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -80%;
      width: 50%;
      height: 100%;
      background: linear-gradient(105deg, transparent 15%, rgba(255, 255, 255, 0.18) 50%, transparent 85%);
      pointer-events: none;
    }

    .search-btn:hover::after {
      animation: btnShimmer 0.5s ease forwards;
    }

    @keyframes btnShimmer {
      from {
        left: -80%;
      }

      to {
        left: 130%;
      }
    }

    /* 플레이어 카드 — 아바타 픽셀 글로우 */
    .player-avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 22px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .player-card:hover .player-avatar-wrap::before {
      opacity: 1;
    }

    /* 랭크 배지 펄스 */
    .player-rank-badge {
      animation: badgePulse 2.5s ease-in-out infinite;
    }

    @keyframes badgePulse {

      0%,
      100% {
        box-shadow: 0 2px 8px rgba(34, 197, 94, 0.4);
      }

      50% {
        box-shadow: 0 2px 18px rgba(34, 197, 94, 0.75);
      }
    }

    /* 스탯 박스 — 진입 스태거 */
    .stat-box {
      opacity: 0;
      transform: translateY(10px);
      transition: border-color 0.2s, background 0.2s,
        opacity 0.35s cubic-bezier(0.23, 1, 0.32, 1),
        transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .stat-box.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* 스탯 박스 상단 accent 라인 */
    .stat-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1.5px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(90deg, var(--green), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stat-box {
      position: relative;
    }

    .stat-box:hover::before {
      opacity: 1;
    }

    /* 숫자 카운트업 — 초기 흐림 처리 */
    .stat-value[data-countup] {
      transition: opacity 0.15s;
    }

    /* 리더보드 헤더 진입 */
    .lb-header {
      animation: heroIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.15s both;
    }

    .lb-tab-bar {
      animation: heroIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
    }

    /* 탭 버튼 — 클릭 ripple */
    .lb-tab {
      position: relative;
      overflow: hidden;
    }

    .lb-tab::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(251, 191, 36, 0.25), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .lb-tab.active::after {
      opacity: 1;
    }

    /* 테이블 — 스캔라인 오버레이 */
    .lb-table-wrap {
      position: relative;
      animation: heroIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.25s both;
    }

    .lb-table-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.03) 3px,
          rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      border-radius: 14px;
    }

    /* 테이블 행 — 스태거 진입 */
    .lb-table tbody tr {
      opacity: 0;
      transform: translateX(-8px);
      animation: rowIn 0.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes rowIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* 행 hover — 왼쪽 accent 라인 */
    .lb-table tr[data-player] {
      position: relative;
    }

    .lb-table tr[data-player]:hover td:first-child {
      box-shadow: inset 2px 0 0 rgba(34, 197, 94, 0.5);
    }

    /* 값 셀 — 글로우 */
    .lb-table td.col-val {
      text-shadow: 0 0 12px rgba(34, 197, 94, 0.15);
      transition: text-shadow 0.2s, color 0.2s;
    }

    .lb-table tr:hover td.col-val {
      text-shadow: 0 0 18px rgba(34, 197, 94, 0.4);
      color: #e8f0ff;
    }

    /* 1~3위 행 특별 처리 */
    .lb-table tr.rank-top1 td {
      background: rgba(251, 191, 36, 0.04) !important;
    }

    .lb-table tr.rank-top2 td {
      background: rgba(148, 163, 184, 0.04) !important;
    }

    .lb-table tr.rank-top3 td {
      background: rgba(205, 127, 50, 0.04) !important;
    }

    .lb-table tr.rank-top1:hover td {
      background: rgba(251, 191, 36, 0.08) !important;
    }

    .lb-table tr.rank-top2:hover td {
      background: rgba(148, 163, 184, 0.07) !important;
    }

    .lb-table tr.rank-top3:hover td {
      background: rgba(205, 127, 50, 0.07) !important;
    }

    /* 1위 값 특별 색상 */
    .lb-table tr.rank-top1 td.col-val {
      color: #fbbf24;
      text-shadow: 0 0 14px rgba(251, 191, 36, 0.4);
    }

    .lb-table tr.rank-top2 td.col-val {
      color: #94a3b8;
    }

    .lb-table tr.rank-top3 td.col-val {
      color: #cd7f32;
    }

    /* 아바타 이미지 hover scale */
    .player-cell img {
      transition: border-color 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lb-table tr:hover .player-cell img {
      transform: scale(1.12);
    }

    /* 새로고침 버튼 hover glow */
    .lb-refresh-btn:hover:not(:disabled) {
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.15);
    }

    /* not-found 진입 */
    .player-not-found.visible {
      animation: heroIn 0.3s ease both;
    }

    /* 스켈레톤 행 */
    .lb-table tbody tr.skel-row {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
    }

    /* ── SEARCH SUGGESTIONS ── */
    .search-suggestions {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      background: #07101e;
      border: 1px solid var(--green-border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 99999;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(34, 197, 94, 0.15);
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: max-height 0.25s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.2s;
    }

    .search-suggestions.open {
      max-height: 260px;
      opacity: 1;
      pointer-events: all;
    }

    .suggestions-list {
      list-style: none;
      overflow-y: auto;
      max-height: 260px;
    }

    .suggestions-list::-webkit-scrollbar {
      width: 4px;
    }

    .suggestions-list::-webkit-scrollbar-thumb {
      background: rgba(34, 197, 94, 0.25);
      border-radius: 2px;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      animation: suggIn 0.2s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    @keyframes suggIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(34, 197, 94, 0.08);
    }

    .suggestion-item.active {
      border-left: 2px solid var(--green);
      padding-left: 12px;
    }

    .sugg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      image-rendering: pixelated;
      border: 1px solid var(--border);
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .suggestion-item.active .sugg-avatar,
    .suggestion-item:hover .sugg-avatar {
      border-color: var(--green-border);
    }

    .sugg-name {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .sugg-name mark {
      background: none;
      color: var(--green);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .sugg-score {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .sugg-hint {
      padding: 7px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sugg-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 18px;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
    }
  </style>
</head>

<body>
  <!-- 검색 자동완성 — body 직속으로 위치, transform 영향 없음 -->
  <div id="search-suggestions" class="search-suggestions" role="listbox" aria-label="검색 추천">
    <ul class="suggestions-list" id="suggestions-list"></ul>
    <div class="sugg-hint" id="sugg-hint" style="display:none">
      <span class="sugg-key">↑↓</span> 이동 &nbsp;
      <span class="sugg-key">Enter</span> 선택 &nbsp;
      <span class="sugg-key">Esc</span> 닫기
    </div>
  </div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-radial" aria-hidden="true"></div>
  <div class="bg-lines" aria-hidden="true"></div>
  <div id="scroll-progress" aria-hidden="true"></div>

  <div id="toast-container" role="region" aria-live="polite" aria-label="알림"></div>

  <div id="lightbox-overlay" class="lightbox-overlay" aria-modal="true" aria-hidden="true" role="dialog">
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightbox-close" aria-label="닫기">×</button>
      <img id="lightbox-img" src="" alt="">
    </div>
  </div>

  <div id="popup-overlay" class="matz-popup-overlay" aria-hidden="true">
    <div id="matz-popup" class="matz-popup" role="dialog" aria-modal="true" aria-hidden="true"
      aria-labelledby="popup-title">
      <div class="matz-popup-bar"></div>
      <div class="matz-popup-inner">
        <div class="matz-popup-header">
          <div class="matz-popup-icon"><span id="popup-icon"></span></div>
          <div>
            <div class="matz-popup-title" id="popup-title"></div>
            <div class="matz-popup-sub" id="popup-sub"></div>
          </div>
        </div>
        <p class="matz-popup-msg" id="popup-msg"></p>
        <div class="matz-popup-actions">
          <button class="matz-popup-btn cancel" id="popup-cancel">취소</button>
          <button class="matz-popup-btn confirm-danger" id="popup-confirm"></button>
        </div>
      </div>
      <div class="matz-popup-corner"></div>
    </div>
  </div>

  <div class="wrap">
    <header id="header-root" class="header"></header>

    <section class="page-hero">
      <h2 class="page-title">Player <span>Ranking</span></h2>
      <p class="page-desc">플레이어 전투 통계와 종합 랭킹을 확인하세요. 닉네임으로 특정 플레이어를 검색할 수 있습니다.</p>
    </section>

    <div class="search-wrap" role="search">
      <div class="search-input-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="플레이어 닉네임 검색..." autocomplete="off"
          spellcheck="false" aria-label="플레이어 닉네임 검색">
        <button id="search-clear" class="search-clear" aria-label="검색 지우기" title="지우기">×</button>
      </div>
      <button id="search-btn" class="search-btn" aria-label="검색 실행">SEARCH</button>
    </div>

    <div id="player-card" class="card player-card" aria-live="polite" aria-label="플레이어 통계">
      <div class="card-top-bar"></div>
      <div class="player-card-inner">
        <div class="player-avatar-wrap">
          <img id="player-avatar" class="player-avatar" src="" alt="플레이어 아바타">
          <span id="player-rank-badge" class="player-rank-badge" aria-label="랭킹 순위"></span>
        </div>
        <div class="player-info">
          <div id="player-name" class="player-name"></div>
          <div class="player-meta">
            <div id="player-cr" class="player-cr"></div>
            <div id="player-wr" class="player-winrate"></div>
          </div>
        </div>
        <div id="player-stats-grid" class="player-stats-grid"></div>
      </div>
    </div>

    <div id="player-not-found" class="player-not-found" role="alert">
      👤 &nbsp;플레이어를 찾을 수 없습니다. 닉네임을 정확히 입력해주세요.
    </div>

    <section class="lb-section" aria-label="리더보드">
      <div class="lb-header">
        <div class="lb-title-wrap">
          <span class="lb-title">🏆 Leaderboard</span>
          <span id="lb-count-badge" class="lb-count-badge" style="display:none"></span>
          <span id="lb-updated" class="lb-updated"></span>

        <div class="lb-controls">
          <button id="lb-refresh-btn" class="lb-refresh-btn" aria-label="데이터 새로고침">

            <span>새로고침</span>
          </button>
        </div>

      <div class="lb-tab-bar" id="lb-tab-bar" role="tablist" aria-label="랭킹 카테고리">
        <button class="lb-tab active" data-tab="score" role="tab" aria-selected="true"><span class="tab-icon">🏅</span>
          COMBAT RATING</button>
        <button class="lb-tab" data-tab="all_kill" role="tab" aria-selected="false"><span class="tab-icon">⚔️</span>
          킬</button>
        <button class="lb-tab" data-tab="all_death" role="tab" aria-selected="false"><span class="tab-icon">💀</span>
          데스</button>
        <button class="lb-tab" data-tab="kill_assist_all" role="tab" aria-selected="false"><span
            class="tab-icon">🤝</span> 어시스트</button>
        <button class="lb-tab" data-tab="round_count" role="tab" aria-selected="false"><span class="tab-icon">🎮</span>
          플레이수</button>
        <button class="lb-tab" data-tab="win_count" role="tab" aria-selected="false"><span class="tab-icon">🏆</span>
          승리수</button>
        <button class="lb-tab" data-tab="playTime_H" role="tab" aria-selected="false"><span class="tab-icon">⏱️</span>
          플레이타임</button>
        <button class="lb-tab" data-tab="kda" role="tab" aria-selected="false"><span class="tab-icon">⚡</span>
          KDA</button>
      </div>

      <div class="lb-table-wrap">
        <table class="lb-table" aria-label="플레이어 순위 테이블">
          <thead>
            <tr>
              <th class="col-rank" scope="col">#</th>
              <th scope="col">플레이어</th>
              <th class="col-val" id="lb-col-label" scope="col">점수</th>
            </tr>
          </thead>
          <tbody id="lb-tbody"></tbody>
        </table>
      </div>
    </section>

    <footer id="footer-root" class="footer"></footer>
  </div>

  <script src="asset/script.js"></script>
  <script>
    (function () {
      'use strict';

      const SUPABASE_URL = 'https://mcojlhiycruiifrcaxam.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_motLaW6vYM8bLPov6QTYMg_LxfbSXfr';
      const FALLBACK_AV = 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect width="24" height="24" fill="#0b1220"/><text x="12" y="17" text-anchor="middle" fill="#22c55e" font-size="13" font-family="monospace">?</text></svg>'
      );

      const TAB_CFG = {
        score: { col: 'COMBAT RATING', fmt: v => (+v).toFixed(1) },
        all_kill: { col: '킬', fmt: v => (+v).toLocaleString() },
        all_death: { col: '데스', fmt: v => (+v).toLocaleString() },
        kill_assist_all: { col: '어시스트', fmt: v => (+v).toLocaleString() },
        round_count: { col: '게임수', fmt: v => (+v).toLocaleString() + ' 판' },
        win_count: { col: '승리', fmt: v => (+v).toLocaleString() + ' 승' },
        playTime_H: { col: '플레이타임', fmt: v => (+v).toLocaleString() + ' h' },
        kda: { col: 'KDA', fmt: v => (+v).toFixed(2) },
      };

      let allPlayers = null;
      let currentTab = 'score';
      let searchedName = '';
      let fetching = false;
      let refreshLocked = false;

      const $ = id => document.getElementById(id);
      const searchInput = $('search-input');
      const searchClear = $('search-clear');
      const searchBtn = $('search-btn');
      const playerCard = $('player-card');
      const playerNF = $('player-not-found');
      const lbTbody = $('lb-tbody');
      const lbColLabel = $('lb-col-label');
      const lbUpdated = $('lb-updated');
      const lbCountBadge = $('lb-count-badge');
      const refreshBtn = $('lb-refresh-btn');

      /* ── 카운트업 애니메이션 ── */
      function countUp(el, target, isFloat, duration) {
        const start = performance.now();
        const isNum = !isNaN(parseFloat(target));
        if (!isNum) { el.textContent = target; return; }
        const numTarget = parseFloat(target);
        const suffix = target.replace(/[\d.,]+/, '').trim();
        const tick = now => {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          const val = numTarget * ease;
          el.textContent = (isFloat ? val.toFixed(isFloat) : Math.round(val).toLocaleString()) + (suffix ? ' ' + suffix : '');
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      /* ── 스탯 박스 스태거 + 카운트업 ── */
      function animateStatBoxes() {
        document.querySelectorAll('.stat-box').forEach((box, i) => {
          setTimeout(() => {
            box.classList.add('revealed');
            const valEl = box.querySelector('.stat-value');
            if (!valEl) return;
            const raw = valEl.dataset.raw || valEl.textContent;
            valEl.dataset.raw = raw;
            const numPart = raw.match(/[\d.]+/);
            if (!numPart) return;
            const isFloat = raw.includes('.') ? (raw.split('.')[1]?.replace(/\D/g, '').length || 1) : false;
            countUp(valEl, raw, isFloat, 600);
          }, i * 60);
        });
      }

      /* ── Supabase 조회 ── */
      async function fetchTable(table) {
        const url = `${SUPABASE_URL}/rest/v1/${table}?select=entry,value&order=value.desc&limit=500`;
        const res = await fetch(url, { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } });
        if (!res.ok) {
          const body = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status} — ${table}: ${body}`);
        }
        const data = await res.json();
        console.log(`[Ranking] ${table}: ${data.length}건 로드`, data.slice(0, 3));
        return data;
      }

      async function loadData(force = false) {
        if (fetching) return;
        if (allPlayers && !force) return;
        fetching = true;
        showSkeletons();
        try {
          const tables = ['all_kill', 'all_death', 'kill_assist_all', 'win_count', 'round_count', 'playTime_H'];
          const settled = await Promise.allSettled(tables.map(t => fetchTable(t)));

          // 실패한 테이블 로그 출력
          settled.forEach((r, i) => {
            if (r.status === 'rejected') console.warn(`[Ranking] ${tables[i]} 로드 실패:`, r.reason);
          });

          const [killR, deathR, assistR, winR, roundR, ptR] =
            settled.map(r => r.status === 'fulfilled' ? r.value : []);

          const map = {};
          const ensure = n => {
            if (!map[n]) map[n] = { name: n, kills: 0, deaths: 0, assists: 0, wins: 0, rounds: 0, playtime: 0 };
          };
          killR?.forEach(r => { if (r.entry) { ensure(r.entry); map[r.entry].kills = +r.value || 0; } });
          deathR?.forEach(r => { if (r.entry) { ensure(r.entry); map[r.entry].deaths = +r.value || 0; } });
          assistR?.forEach(r => { if (r.entry) { ensure(r.entry); map[r.entry].assists = +r.value || 0; } });
          winR?.forEach(r => { if (r.entry) { ensure(r.entry); map[r.entry].wins = +r.value || 0; } });
          roundR?.forEach(r => { if (r.entry) { ensure(r.entry); map[r.entry].rounds = +r.value || 0; } });
          ptR?.forEach(r => { if (r.entry) { ensure(r.entry); map[r.entry].playtime = +r.value || 0; } });

          console.log('[Ranking] 전체 플레이어 수 (필터 전):', Object.keys(map).length);

          // 모든 테이블에서 한 번이라도 등장한 플레이어 포함 (0값 필터 제거)
          const players = Object.values(map);
          console.log('[Ranking] 필터 후 플레이어 수:', players.length);

          players.forEach(p => {
            p.kda = p.deaths > 0 ? (p.kills + p.assists) / p.deaths : (p.kills + p.assists);
            p.winRate = p.rounds > 0 ? (p.wins / p.rounds) * 100 : 0;
          });

          const maxKda = Math.max(1, ...players.map(p => p.kda));
          const maxWinRate = Math.max(1, ...players.map(p => p.winRate));
          const maxRounds = Math.max(1, ...players.map(p => p.rounds));
          const maxPt = Math.max(1, ...players.map(p => p.playtime));

          players.forEach(p => {
            p.score = Math.round(
              ((p.kda / maxKda) * 40 + (p.winRate / maxWinRate) * 30 +
                (p.rounds / maxRounds) * 20 + (p.playtime / maxPt) * 10) * 10
            ) / 10;
          });

          // score 기준 내림차순 정렬 후 저장
          allPlayers = players.sort((a, b) => b.score - a.score);
          console.log('[Ranking] 상위 5명:', allPlayers.slice(0, 5).map(p => `${p.name}(${p.score}CR)`));

          const now = new Date();
          lbUpdated.textContent = '· ' + now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ' 기준';
          lbCountBadge.textContent = players.length + '명';
          lbCountBadge.style.display = '';

          renderTable(currentTab);
          if (searchedName) performSearch(searchedName, false);
        } catch (err) {
          showTableError(err.message);
          console.error('[Ranking] loadData error:', err);
        } finally {
          fetching = false;
          setRefreshState(false);
        }
      }

      function renderTable(tab) {
        currentTab = tab;
        if (!allPlayers) return;

        const cfg = TAB_CFG[tab];
        lbColLabel.textContent = cfg.col;

        const key = {
          score: 'score', all_kill: 'kills', all_death: 'deaths',
          kill_assist_all: 'assists', round_count: 'rounds',
          win_count: 'wins', playTime_H: 'playtime', kda: 'kda'
        }[tab];
        const sorted = [...allPlayers].sort((a, b) => b[key] - a[key]);

        if (sorted.length === 0) {
          lbTbody.innerHTML = `<tr><td colspan="3"><div class="lb-empty">
            <span class="lb-empty-icon">📭</span>
            <p class="lb-empty-text">랭킹 데이터가 없습니다</p>
            <p class="lb-empty-sub">DB에 데이터를 확인해주세요</p>
          </div></td></tr>`;
          return;
        }
        const medals = ['🥇', '🥈', '🥉'];
        const topClass = ['rank-top1', 'rank-top2', 'rank-top3'];
        const lowSearch = searchedName.toLowerCase();

        lbTbody.innerHTML = sorted.map((p, i) => {
          const val = p[key];
          const rankHtml = i < 3
            ? `<span class="rank-medal">${medals[i]}</span>`
            : `<span class="rank-pos">${i + 1}</span>`;
          const safeName = escHtml(p.name);
          const isSearched = lowSearch && p.name.toLowerCase() === lowSearch;
          const nameClass = isSearched ? 'player-cell-name is-searched' : 'player-cell-name';
          const rowExtra = [
            isSearched ? 'row-highlighted' : '',
            i < 3 ? topClass[i] : '',
          ].filter(Boolean).join(' ');

          /* 행 진입 delay */
          const delay = Math.min(i * 28, 400);

          return `<tr class="${rowExtra}" data-player="${safeName}" style="animation-delay:${delay}ms">
            <td class="col-rank">${rankHtml}</td>
            <td>
              <div class="player-cell">
                <img src="https://mc-heads.net/avatar/${encodeURIComponent(p.name)}/32"
                     alt="${safeName}" onerror="this.src='${FALLBACK_AV}'" loading="lazy">
                <span class="${nameClass}">${safeName}</span>
              </div>
            </td>
            <td class="col-val">${cfg.fmt(val)}</td>
          </tr>`;
        }).join('');

        lbTbody.querySelectorAll('tr[data-player]').forEach(row => {
          row.addEventListener('click', () => {
            const name = row.dataset.player;
            searchInput.value = name;
            searchClear.classList.add('visible');
            performSearch(name, true);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        });
      }

      function performSearch(name, triggerScroll) {
        name = name.trim();
        if (!name) {
          playerCard.classList.remove('visible');
          playerNF.classList.remove('visible');
          searchedName = '';
          searchClear.classList.remove('visible');
          if (allPlayers) renderTable(currentTab);
          return;
        }
        searchedName = name;
        searchClear.classList.add('visible');
        if (!allPlayers) return;

        const found = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
        if (found) {
          renderPlayerCard(found);
          playerNF.classList.remove('visible');
          if (triggerScroll) playerCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          playerCard.classList.remove('visible');
          playerNF.classList.add('visible');
        }
        renderTable(currentTab);
      }

      function renderPlayerCard(p) {
        const scoreRank = [...allPlayers].sort((a, b) => b.score - a.score)
          .findIndex(x => x.name === p.name) + 1;
        const wr = p.rounds > 0 ? (p.wins / p.rounds * 100).toFixed(1) : '0.0';

        $('player-avatar').src = `https://mc-heads.net/avatar/${encodeURIComponent(p.name)}/100`;
        $('player-avatar').onerror = function () { this.src = FALLBACK_AV; };
        $('player-name').textContent = p.name;
        $('player-cr').textContent = `COMBAT RATING · ${p.score.toFixed(1)} CR`;
        $('player-wr').textContent = `WIN RATE · ${wr}%  (${p.wins}W / ${p.rounds}G)`;
        $('player-rank-badge').textContent = scoreRank > 0 ? '#' + scoreRank : '';

        /* stat-box — data-raw 속성으로 카운트업 원본값 보존 */
        $('player-stats-grid').innerHTML = [
          { label: '킬', val: p.kills.toLocaleString(), raw: p.kills, cls: '' },
          { label: '데스', val: p.deaths.toLocaleString(), raw: p.deaths, cls: '' },
          { label: '어시스트', val: p.assists.toLocaleString(), raw: p.assists, cls: '' },
          { label: 'KDA', val: p.kda.toFixed(2), raw: p.kda.toFixed(2), cls: 'kda-val' },
          { label: '승률', val: wr + '%', raw: wr, cls: 'wr-val' },
          { label: '플레이', val: p.rounds + ' 판', raw: p.rounds, cls: '' },
          { label: '승리', val: p.wins + ' 승', raw: p.wins, cls: '' },
          { label: '타임', val: p.playtime + ' h', raw: p.playtime, cls: '' },
          { label: 'CR', val: p.score.toFixed(1), raw: p.score.toFixed(1), cls: 'cr-val' },
        ].map(s => `
          <div class="stat-box">
            <div class="stat-label">${s.label}</div>
            <div class="stat-value ${s.cls}" data-raw="${s.raw}">${s.val}</div>
          </div>`).join('');

        playerCard.classList.add('visible');
        /* 카드가 DOM에 붙은 뒤 애니메이션 실행 */
        requestAnimationFrame(() => requestAnimationFrame(animateStatBoxes));
      }

      function showSkeletons() {
        lbTbody.innerHTML = Array(10).fill('').map(() => `
          <tr class="skel-row">
            <td><div class="skeleton skeleton-cell" style="width:28px"></div></td>
            <td><div class="skeleton skeleton-cell" style="width:min(180px,50%)"></div></td>
            <td style="text-align:right"><div class="skeleton skeleton-cell" style="width:60px;margin-left:auto"></div></td>
          </tr>`).join('');
      }

      function showTableError(msg) {
        lbTbody.innerHTML = `<tr class="skel-row"><td colspan="3"><div class="lb-empty">
          <span class="lb-empty-icon">⚠️</span>
          <p class="lb-empty-text">데이터를 불러오지 못했습니다</p>
          <p class="lb-empty-sub">${escHtml(msg)}</p>
          <p class="lb-empty-sub" style="margin-top:8px;opacity:0.6">브라우저 콘솔(F12)에서 자세한 오류를 확인하세요</p>
          <button onclick="location.reload()" style="margin-top:14px;padding:8px 18px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:8px;color:#22c55e;font-family:monospace;font-size:12px;cursor:pointer;letter-spacing:1px">⟳ 새로고침</button>
        </div></td></tr>`;
      }

      function setRefreshState(on) {
        refreshBtn.disabled = on;
        refreshBtn.classList.toggle('spinning', on);
      }

      function escHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function handleUrlParams() {
        const params = new URLSearchParams(location.search);
        const tab = params.get('tab');
        const player = params.get('player');
        if (tab && TAB_CFG[tab]) {
          document.querySelectorAll('.lb-tab').forEach(t => {
            const active = t.dataset.tab === tab;
            t.classList.toggle('active', active);
            t.setAttribute('aria-selected', String(active));
          });
          currentTab = tab;
        }
        if (player) {
          searchInput.value = player;
          searchedName = player;
          searchClear.classList.add('visible');
        }
      }

      /* 탭 전환 */
      $('lb-tab-bar').addEventListener('click', e => {
        const tab = e.target.closest('.lb-tab');
        if (!tab || tab.classList.contains('active')) return;
        document.querySelectorAll('.lb-tab').forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        renderTable(tab.dataset.tab);
      });

      /* 새로고침 */
      refreshBtn.addEventListener('click', () => {
        if (refreshLocked) return;
        refreshLocked = true;
        setRefreshState(true);
        allPlayers = null;
        loadData(true).finally(() => {
          setTimeout(() => { refreshLocked = false; }, 8000);
        });
      });

      /* 검색 */
      searchBtn.addEventListener('click', () => performSearch(searchInput.value, true));
      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') performSearch(searchInput.value, true);
        if (e.key === 'Escape') { searchInput.value = ''; performSearch('', false); }
      });
      searchInput.addEventListener('input', () => {
        searchClear.classList.toggle('visible', searchInput.value.length > 0);
      });
      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        performSearch('', false);
        searchInput.focus();
      });


      /* ════════════════════════════════════════
         SEARCH SUGGESTIONS
      ════════════════════════════════════════ */
      const suggestionsBox = $('search-suggestions');
      const suggestionsList = $('suggestions-list');
      const suggHint = $('sugg-hint');
      const FALLBACK_AV_SUGG = FALLBACK_AV;
      let suggActive = -1;   // 키보드 포커스 인덱스
      let suggItems = [];   // 현재 표시된 항목들

      function positionSuggestions() {
        const rect = searchInput.closest('.search-input-wrap').getBoundingClientRect();
        suggestionsBox.style.top = (rect.bottom + 6) + 'px';
        suggestionsBox.style.left = rect.left + 'px';
        suggestionsBox.style.width = rect.width + 'px';
      }
      function openSuggestions() {
        positionSuggestions();
        suggestionsBox.classList.add('open');
        if (suggItems.length > 0) suggHint.style.display = '';
      }
      window.addEventListener('resize', () => { if (suggestionsBox.classList.contains('open')) positionSuggestions(); }, { passive: true });
      window.addEventListener('scroll', () => { if (suggestionsBox.classList.contains('open')) positionSuggestions(); }, { passive: true });
      function closeSuggestions() {
        suggestionsBox.classList.remove('open');
        suggActive = -1;
        suggItems = [];
      }

      function renderSuggestions(query) {
        if (!allPlayers || !query) { closeSuggestions(); return; }

        const q = query.toLowerCase();
        const hits = allPlayers
          .filter(p => p.name.toLowerCase().includes(q))
          .sort((a, b) => {
            /* 시작 일치를 위로 */
            const aStart = a.name.toLowerCase().startsWith(q);
            const bStart = b.name.toLowerCase().startsWith(q);
            if (aStart && !bStart) return -1;
            if (!aStart && bStart) return 1;
            return b.score - a.score;
          })
          .slice(0, 8);

        if (!hits.length) { closeSuggestions(); return; }

        suggItems = hits;
        suggActive = -1;

        suggestionsList.innerHTML = hits.map((p, i) => {
          /* 매칭 부분 하이라이트 */
          const idx = p.name.toLowerCase().indexOf(q);
          const name = idx >= 0
            ? escHtml(p.name.slice(0, idx)) +
            '<mark>' + escHtml(p.name.slice(idx, idx + q.length)) + '</mark>' +
            escHtml(p.name.slice(idx + q.length))
            : escHtml(p.name);

          return `<li class="suggestion-item" role="option" data-idx="${i}" style="animation-delay:${i * 30}ms">
            <img class="sugg-avatar"
              src="https://mc-heads.net/avatar/${encodeURIComponent(p.name)}/26"
              alt="" onerror="this.src='${FALLBACK_AV_SUGG}'" loading="lazy">
            <span class="sugg-name">${name}</span>
            <span class="sugg-score">${p.score.toFixed(1)} CR</span>
          </li>`;
        }).join('');

        /* 클릭 이벤트 */
        suggestionsList.querySelectorAll('.suggestion-item').forEach(item => {
          item.addEventListener('mousedown', e => {
            e.preventDefault(); // blur 방지
            const idx = +item.dataset.idx;
            const name = suggItems[idx]?.name;
            if (!name) return;
            searchInput.value = name;
            searchClear.classList.add('visible');
            closeSuggestions();
            performSearch(name, true);
          });
        });

        openSuggestions();
      }

      function moveSuggestion(dir) {
        if (!suggItems.length) return;
        const items = suggestionsList.querySelectorAll('.suggestion-item');
        if (suggActive >= 0) items[suggActive]?.classList.remove('active');
        suggActive = Math.max(0, Math.min(suggItems.length - 1, suggActive + dir));
        const active = items[suggActive];
        active?.classList.add('active');
        active?.scrollIntoView({ block: 'nearest' });
        /* 입력창에 미리보기 */
        searchInput.value = suggItems[suggActive]?.name || searchInput.value;
      }

      function selectTopSuggestion() {
        if (suggItems.length === 0) return false;
        const idx = suggActive >= 0 ? suggActive : 0;
        const name = suggItems[idx]?.name;
        if (!name) return false;
        searchInput.value = name;
        searchClear.classList.add('visible');
        closeSuggestions();
        performSearch(name, true);
        return true;
      }

      /* 기존 input 이벤트에 suggestion 연동 */
      searchInput.addEventListener('input', () => {
        searchClear.classList.toggle('visible', searchInput.value.length > 0);
        renderSuggestions(searchInput.value.trim());
      });

      /* 기존 keydown 이벤트 교체 — Enter 시 suggestion 우선 */
      searchInput.removeEventListener('keydown', null); // 기존 제거 불가, 새로 override
      searchInput.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown') { e.preventDefault(); moveSuggestion(1); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); moveSuggestion(-1); return; }
        if (e.key === 'Enter') {
          if (suggestionsBox.classList.contains('open')) {
            e.preventDefault();
            if (!selectTopSuggestion()) performSearch(searchInput.value, true);
          } else {
            performSearch(searchInput.value, true);
          }
          return;
        }
        if (e.key === 'Escape') {
          if (suggestionsBox.classList.contains('open')) { closeSuggestions(); }
          else { searchInput.value = ''; performSearch('', false); }
        }
      }, true); // capture — 기존 listener보다 먼저 실행

      /* 바깥 클릭 시 닫기 */
      document.addEventListener('click', e => {
        if (!searchInput.closest('.search-input-wrap').contains(e.target)) closeSuggestions();
      });

      /* 포커스 시 기존 쿼리로 다시 열기 */
      searchInput.addEventListener('focus', () => {
        if (searchInput.value.trim()) renderSuggestions(searchInput.value.trim());
      });

      handleUrlParams();
      loadData();
    })();
  </script>
</body>

</html>
