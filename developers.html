<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developers — Min. At. Zero</title>
  <meta name="description" content="Min. At. Zero 프로젝트 기여자 목록">
  <meta name="theme-color" content="#22c55e">
  <link rel="icon" type="image/png" href="asset/image/icon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="asset/style.css">
  <style>
    .page-hero {
      padding: 44px 0 32px;
    }

    .page-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s 0.12s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    .page-title span {
      color: var(--green);
    }

    .page-desc {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.75;
      margin-top: 14px;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    /* ── SECTION ── */
    .dev-section {
      margin-top: 60px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .section-icon {
      font-size: 20px;
    }

    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 1px;
    }

    .section-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      background: var(--green-glow);
      padding: 2px 9px;
      border-radius: 6px;
    }

    /* ── DEV GRID ── */
    .dev-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── DEV CARD ── */
    .dev-card {
      text-align: center;
      padding: 40px 24px 30px;
      /* 진입 초기 상태 */
      opacity: 0;
      transform: translateY(20px) scale(0.97);
      transition: opacity 0.5s cubic-bezier(0.23, 1, 0.32, 1),
        transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
        border-color 0.3s, box-shadow 0.3s;
    }

    .dev-card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* 아바타 */
    .dev-avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 20px;
    }

    .dev-avatar {
      width: 100%;
      height: 100%;
      border-radius: 22px;
      image-rendering: pixelated;
      border: 2px solid var(--green-border);
      background: var(--bg-deep);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s, box-shadow 0.3s;
    }

    /* 아바타 글로우 링 */
    .dev-avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 27px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.18), transparent 70%);
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
    }

    .dev-card:hover .dev-avatar-wrap::before {
      opacity: 1;
    }

    .dev-card:hover .dev-avatar {
      transform: scale(1.1) translateY(-5px);
      border-color: var(--green);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.6), 0 0 20px rgba(34, 197, 94, 0.2);
    }

    /* 이름·역할 */
    .dev-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .dev-role {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .dev-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.85;
      margin: 18px 0;
      min-height: 3.6em;
    }

    /* 태그 */
    .dev-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .dev-tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text-dim);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .dev-card:hover .dev-tag {
      border-color: rgba(34, 197, 94, 0.2);
      color: var(--text-muted);
    }

    /* ── 섹션별 색상 ── */
    .section-maps .section-count {
      color: var(--blue);
      background: var(--blue-glow);
    }

    .section-maps .dev-avatar {
      border-color: var(--blue-border);
    }

    .section-maps .dev-role {
      color: var(--blue);
    }

    .section-maps .dev-avatar-wrap::before {
      background: radial-gradient(circle, rgba(59, 130, 246, 0.18), transparent 70%);
    }

    .section-maps .dev-card:hover .dev-avatar {
      border-color: var(--blue);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.6), 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .section-maps .dev-card:hover .dev-tag {
      border-color: rgba(59, 130, 246, 0.2);
    }

    .section-testers .section-count {
      color: #a855f7;
      background: rgba(168, 85, 247, 0.1);
    }

    .section-testers .dev-avatar {
      border-color: rgba(168, 85, 247, 0.3);
    }

    .section-testers .dev-role {
      color: #c084fc;
    }

    .section-testers .dev-avatar-wrap::before {
      background: radial-gradient(circle, rgba(168, 85, 247, 0.18), transparent 70%);
    }

    .section-testers .dev-card:hover .dev-avatar {
      border-color: #a855f7;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.6), 0 0 20px rgba(168, 85, 247, 0.2);
    }

    /* ── 섹션 진입 애니메이션 ── */
    .dev-section {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .dev-section.section-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── 링크 버튼 구분선 ── */
    .dev-links-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 12px 0;
    }

    .dev-links-divider::before,
    .dev-links-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    .dev-links-divider span {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── 링크 버튼 ── */
    .dev-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .dev-link-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.45);
      text-decoration: none;
      transition: color 0.22s, background 0.22s, border-color 0.22s,
        transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.22s;
    }

    .dev-link-btn svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .dev-link-btn:hover {
      transform: translateY(-4px) scale(1.08);
    }

    /* 툴팁 */
    .dev-link-btn::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: rgba(10, 16, 28, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      padding: 4px 9px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s, transform 0.18s;
    }

    .dev-link-btn:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* 플랫폼별 색상 */
    .dev-link-btn.link-namemc {
      --c: 71, 158, 71;
    }

    .dev-link-btn.link-youtube {
      --c: 255, 0, 0;
    }

    .dev-link-btn.link-github {
      --c: 210, 210, 210;
    }

    .dev-link-btn.link-twitter {
      --c: 29, 161, 242;
    }

    .dev-link-btn.link-discord {
      --c: 114, 137, 218;
    }

    .dev-link-btn.link-instagram {
      --c: 225, 48, 108;
    }

    .dev-link-btn.link-twitch {
      --c: 145, 70, 255;
    }

    .dev-link-btn.link-website {
      --c: 34, 197, 94;
    }

    .dev-link-btn:hover {
      color: rgb(var(--c));
      background: rgba(var(--c), 0.12);
      border-color: rgba(var(--c), 0.45);
      box-shadow: 0 6px 20px rgba(var(--c), 0.22), inset 0 1px 0 rgba(var(--c), 0.1);
    }
  </style>
</head>

<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-radial" aria-hidden="true"></div>
  <div class="bg-lines" aria-hidden="true"></div>

  <div class="wrap">
    <header id="header-root" class="header"></header>

    <section class="page-hero">
      <h2 class="page-title">Project <span>Team</span></h2>
      <p class="page-desc">Min. At. Zero 서버를 기획하고 전장을 설계하며, 완벽한 플레이 환경을 위해 노력하는 기여자들을 소개합니다.<br>만약 아래 정보에 오류가 있거나, 본인이 기여자임에도 누락된 경우 <a href="https://discord.gg/xAPPegjYnN" style="color: var(--green); text-decoration: underline;">디스코드</a>로 알려주세요!
      </p>
    </section>

    <div id="dev-content">
      <!-- 스켈레톤 -->
      <div class="dev-section section-visible">
        <div class="section-header">
          <div class="skeleton" style="width:160px;height:26px;border-radius:4px;"></div>
          <div class="skeleton" style="width:32px;height:20px;border-radius:6px;"></div>
        </div>
        <div class="dev-grid">
          <div class="card dev-card skeleton revealed" style="height:320px;border:none;opacity:.5;"></div>
          <div class="card dev-card skeleton revealed" style="height:320px;border:none;opacity:.3;"></div>
          <div class="card dev-card skeleton revealed" style="height:320px;border:none;opacity:.15;"></div>
        </div>
      </div>
    </div>

    <footer id="footer-root" class="footer"></footer>
  </div>

  <script src="asset/script.js"></script>
  <script>
    (function () {
      const content = document.getElementById('dev-content');
      const CATEGORIES = {
        "총괄/기획": { icon: "👑", title: "CORE & PLANNING", class: "section-core" },
        "맵 디자이너": { icon: "🗺️", title: "MAP DESIGNERS", class: "section-maps" },
        "테스터": { icon: "🧪", title: "BETA TESTERS", class: "section-testers" },
      };

      /* ── NameMC SVG 아이콘 (Minecraft 잔디 블록 느낌) ── */
      const NAMEMC_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="4"/><rect x="5" y="5" width="6" height="6" fill="rgba(0,0,0,0.55)"/><rect x="13" y="5" width="6" height="6" fill="rgba(0,0,0,0.55)"/><rect x="5" y="13" width="6" height="6" fill="rgba(0,0,0,0.55)"/><rect x="13" y="13" width="6" height="6" fill="rgba(0,0,0,0.55)"/></svg>`;

      /* ── 링크 플랫폼 감지 ── */
      const LINK_PLATFORMS = [
        {
          key: 'youtube', class: 'link-youtube', label: 'YouTube',
          match: u => /youtube\.com|youtu\.be/i.test(u),
          icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>`
        },
        {
          key: 'github', class: 'link-github', label: 'GitHub',
          match: u => /github\.com/i.test(u),
          icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.7 18 5 18 5c.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3z"/></svg>`
        },
        {
          key: 'twitter', class: 'link-twitter', label: 'X (Twitter)',
          match: u => /twitter\.com|x\.com/i.test(u),
          icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 1h3.7l-8 9.2L24 23h-7.4l-5.8-7.5L4.4 23H.7l8.6-9.8L0 1h7.6l5.2 6.8zm-1.3 19.8h2L6.5 3.2H4.3z"/></svg>`
        },
        {
          key: 'discord', class: 'link-discord', label: 'Discord',
          match: u => /discord\.gg|discord\.com/i.test(u),
          icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A19.8 19.8 0 0 0 15.4 3c-.2.4-.5.9-.7 1.3a18.3 18.3 0 0 0-5.4 0A13 13 0 0 0 8.6 3a19.7 19.7 0 0 0-4.9 1.4C.5 8.9-.3 13.3.1 17.6a20 20 0 0 0 6 3c.5-.6.9-1.3 1.3-2a13 13 0 0 1-2-.9l.5-.4a14.2 14.2 0 0 0 12.2 0l.5.4a13 13 0 0 1-2 1c.4.7.8 1.4 1.2 2a19.9 19.9 0 0 0 6.1-3.1c.5-4.9-.8-9.2-3.6-13.2zM8 15c-1.2 0-2.1-1.1-2.1-2.4S6.8 10.2 8 10.2s2.1 1.1 2.1 2.4S9.2 15 8 15zm8 0c-1.2 0-2.1-1.1-2.1-2.4s.9-2.4 2.1-2.4 2.1 1.1 2.1 2.4S17.2 15 16 15z"/></svg>`
        },
        {
          key: 'instagram', class: 'link-instagram', label: 'Instagram',
          match: u => /instagram\.com/i.test(u),
          icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 3.3.1 4.8 1.7 4.9 4.9.1 1.3.1 1.6.1 4.8 0 3.2 0 3.6-.1 4.8-.1 3.2-1.7 4.8-4.9 4.9-1.3.1-1.6.1-4.9.1-3.2 0-3.6 0-4.8-.1-3.3-.1-4.8-1.7-4.9-4.9C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.8C2.4 3.9 4 2.3 7.2 2.2 8.4 2.2 8.8 2.2 12 2.2zm0-2.2C8.7 0 8.3 0 7.1.1 2.7.3.3 2.7.1 7.1 0 8.3 0 8.7 0 12s0 3.7.1 4.9c.2 4.4 2.6 6.8 7 7C8.3 24 8.7 24 12 24s3.7 0 4.9-.1c4.4-.2 6.8-2.6 7-7 .1-1.2.1-1.6.1-4.9s0-3.7-.1-4.9c-.2-4.4-2.6-6.8-7-7C15.7 0 15.3 0 12 0zm0 5.8a6.2 6.2 0 1 0 0 12.4A6.2 6.2 0 0 0 12 5.8zm0 10.2a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.4-11.8a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8z"/></svg>`
        },
        {
          key: 'twitch', class: 'link-twitch', label: 'Twitch',
          match: u => /twitch\.tv/i.test(u),
          icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.6 6H13v4.5h-1.4zm3.8 0H17v4.5h-1.5zM2.4 0L0 2.5V21h6V24l3-3h4.5L21 15V0zm17 14.3L16 17H11l-3 3v-3H3V1.5h16.5z"/></svg>`
        },
        {
          key: 'website', class: 'link-website', label: 'Website',
          match: () => true,
          icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`
        },
      ];

      function renderLinks(links, mc_id) {
        const allLinks = [];

        /* NameMC 항상 첫 번째 */
        if (mc_id) {
          allLinks.push(`<a class="dev-link-btn link-namemc"
            href="https://ko.namemc.com/profile/${encodeURIComponent(mc_id)}"
            target="_blank" rel="noopener noreferrer" data-label="NameMC">
            ${NAMEMC_ICON}
          </a>`);
        }

        /* 나머지 링크 */
        if (links && typeof links === 'object') {
          Object.values(links).forEach(url => {
            if (!url) return;
            const platform = LINK_PLATFORMS.find(p => p.match(url)) || LINK_PLATFORMS.at(-1);
            allLinks.push(`<a class="dev-link-btn ${platform.class}"
              href="${url}" target="_blank" rel="noopener noreferrer" data-label="${platform.label}">
              ${platform.icon}
            </a>`);
          });
        }

        if (!allLinks.length) return '';
        return `
          <div class="dev-links-divider"><span>links</span></div>
          <div class="dev-links">${allLinks.join('')}</div>`;
      }

      /* IntersectionObserver — 섹션·카드 등장 */
      const sectionObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('section-visible'); sectionObs.unobserve(e.target); } });
      }, { threshold: 0.08 });

      const cardObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); cardObs.unobserve(e.target); } });
      }, { threshold: 0.08 });

      async function loadDevelopers() {
        try {
          const res = await fetch('./developer/developer.json');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          content.innerHTML = '';
          const groups = data.reduce((acc, dev) => {
            if (!acc[dev.type]) acc[dev.type] = [];
            acc[dev.type].push(dev);
            return acc;
          }, {});

          Object.keys(CATEGORIES).forEach((type, si) => {
            if (!groups[type]) return;
            const cfg = CATEGORIES[type];
            const section = document.createElement('section');
            section.className = `dev-section ${cfg.class}`;
            section.innerHTML = `
              <div class="section-header">
                <span class="section-icon">${cfg.icon}</span>
                <h2 class="section-title">${cfg.title}</h2>
                <span class="section-count">${groups[type].length}</span>
              </div>
              <div class="dev-grid"></div>`;

            const grid = section.querySelector('.dev-grid');
            groups[type].forEach((dev, i) => {
              const card = document.createElement('article');
              card.className = 'card dev-card';
              card.style.transitionDelay = (i * 70) + 'ms';
              card.innerHTML = `
                <div class="card-top-bar"></div>
                <div class="dev-avatar-wrap">
                  <img class="dev-avatar"
                    src="https://mc-heads.net/avatar/${encodeURIComponent(dev.mc_id)}/100"
                    alt="${dev.name}" loading="lazy"
                    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230b1220%22/><text x=%2250%22 y=%2260%22 text-anchor=%22middle%22 fill=%22%2322c55e%22 font-size=%2240%22>?</text></svg>'">
                </div>
                <h3 class="dev-name">${dev.name}</h3>
                <p class="dev-role">${dev.role}</p>
                <p class="dev-desc">${dev.desc}</p>
                <div class="dev-tags">${dev.tags.map(t => `<span class="dev-tag">${t}</span>`).join('')}</div>
                ${renderLinks(dev.link, dev.mc_id)}`;
              grid.appendChild(card);
              cardObs.observe(card);
            });

            content.appendChild(section);
            /* 약간 딜레이 후 섹션 관찰 시작 */
            requestAnimationFrame(() => sectionObs.observe(section));
          });
        } catch (e) {
          content.innerHTML = `<div style="color:var(--red);text-align:center;padding:40px;">⚠️ ERROR: ${e.message}</div>`;
        }
      }

      document.addEventListener('DOMContentLoaded', loadDevelopers);
    })();
  </script>
</body>

</html>
