<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developers — Min. At. Zero</title>
  <meta name="description" content="Min. At. Zero 프로젝트 기여자 목록">
  <meta name="theme-color" content="#22c55e">
  <link rel="icon" type="image/png" href="asset/image/icon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="asset/style.css">
  <style>
    .page-hero { padding: 44px 0 32px; }
    .page-title { font-family: 'Rajdhani', sans-serif; font-size: clamp(32px, 8vw, 52px); font-weight: 700; color: var(--text-primary); line-height: 1.1; }
    .page-title span { color: var(--green); }
    .page-desc { font-size: 15px; color: var(--text-muted); max-width: 600px; line-height: 1.75; margin-top: 14px; }

    /* ── SECTION ── */
    .dev-section { margin-top: 60px; }
    .section-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
      padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .section-icon { font-size: 20px; }
    .section-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: 1px; }
    .section-count { font-family: var(--mono); font-size: 12px; color: var(--green); background: var(--green-glow); padding: 2px 9px; border-radius: 6px; }

    /* ── DEV GRID ── */
    .dev-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

    /* ── DEV CARD ── */
    .dev-card {
      text-align: center; padding: 40px 24px 30px;
      /* 진입 초기 상태 */
      opacity: 0; transform: translateY(20px) scale(0.97);
      transition: opacity 0.5s cubic-bezier(0.23,1,0.32,1),
                  transform 0.5s cubic-bezier(0.23,1,0.32,1),
                  border-color 0.3s, box-shadow 0.3s;
    }
    .dev-card.revealed { opacity: 1; transform: translateY(0) scale(1); }

    /* 아바타 */
    .dev-avatar-wrap { position: relative; width: 96px; height: 96px; margin: 0 auto 20px; }
    .dev-avatar {
      width: 100%; height: 100%; border-radius: 22px; image-rendering: pixelated;
      border: 2px solid var(--green-border); background: var(--bg-deep);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.3s;
    }
    /* 아바타 글로우 링 */
    .dev-avatar-wrap::before {
      content: ''; position: absolute; inset: -5px; border-radius: 27px;
      background: radial-gradient(circle, rgba(34,197,94,0.18), transparent 70%);
      opacity: 0; transition: opacity 0.35s; pointer-events: none;
    }
    .dev-card:hover .dev-avatar-wrap::before { opacity: 1; }
    .dev-card:hover .dev-avatar {
      transform: scale(1.1) translateY(-5px);
      border-color: var(--green);
      box-shadow: 0 16px 36px rgba(0,0,0,0.6), 0 0 20px rgba(34,197,94,0.2);
    }

    /* 이름·역할 */
    .dev-name { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .dev-role { font-family: var(--mono); font-size: 11px; color: var(--green); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 8px; }
    .dev-desc { font-size: 13px; color: var(--text-muted); line-height: 1.85; margin: 18px 0; min-height: 3.6em; }

    /* 태그 */
    .dev-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .dev-tag {
      font-family: var(--mono); font-size: 11px; padding: 3px 10px;
      border-radius: 5px; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); color: var(--text-dim);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .dev-card:hover .dev-tag { border-color: rgba(34,197,94,0.2); color: var(--text-muted); }

    /* ── 섹션별 색상 ── */
    .section-maps .section-count { color: var(--blue); background: var(--blue-glow); }
    .section-maps .dev-avatar    { border-color: var(--blue-border); }
    .section-maps .dev-role      { color: var(--blue); }
    .section-maps .dev-avatar-wrap::before { background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%); }
    .section-maps .dev-card:hover .dev-avatar { border-color: var(--blue); box-shadow: 0 16px 36px rgba(0,0,0,0.6), 0 0 20px rgba(59,130,246,0.2); }
    .section-maps .dev-card:hover .dev-tag   { border-color: rgba(59,130,246,0.2); }

    .section-testers .section-count { color: #a855f7; background: rgba(168,85,247,0.1); }
    .section-testers .dev-avatar    { border-color: rgba(168,85,247,0.3); }
    .section-testers .dev-role      { color: #c084fc; }
    .section-testers .dev-avatar-wrap::before { background: radial-gradient(circle, rgba(168,85,247,0.18), transparent 70%); }
    .section-testers .dev-card:hover .dev-avatar { border-color: #a855f7; box-shadow: 0 16px 36px rgba(0,0,0,0.6), 0 0 20px rgba(168,85,247,0.2); }

    /* ── 섹션 진입 애니메이션 ── */
    .dev-section { opacity: 0; transform: translateY(18px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .dev-section.section-visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-radial" aria-hidden="true"></div>
  <div class="bg-lines" aria-hidden="true"></div>

  <div class="wrap">
    <header id="header-root" class="header"></header>

    <section class="page-hero">
      <h2 class="page-title">Project <span>Team</span></h2>
      <p class="page-desc">Min. At. Zero 서버를 기획하고 전장을 설계하며, 완벽한 플레이 환경을 위해 노력하는 기여자들을 소개합니다.</p>
    </section>

    <div id="dev-content">
      <!-- 스켈레톤 -->
      <div class="dev-section section-visible">
        <div class="section-header">
          <div class="skeleton" style="width:160px;height:26px;border-radius:4px;"></div>
          <div class="skeleton" style="width:32px;height:20px;border-radius:6px;"></div>
        </div>
        <div class="dev-grid">
          <div class="card dev-card skeleton revealed" style="height:320px;border:none;opacity:.5;"></div>
          <div class="card dev-card skeleton revealed" style="height:320px;border:none;opacity:.3;"></div>
          <div class="card dev-card skeleton revealed" style="height:320px;border:none;opacity:.15;"></div>
        </div>
      </div>
    </div>

    <footer id="footer-root" class="footer"></footer>
  </div>

  <script src="asset/script.js"></script>
  <script>
    (function () {
      const content = document.getElementById('dev-content');
      const CATEGORIES = {
        "총괄/기획":   { icon: "👑", title: "CORE & PLANNING", class: "section-core"    },
        "맵 디자이너": { icon: "🗺️", title: "MAP DESIGNERS",   class: "section-maps"    },
        "테스터":      { icon: "🧪", title: "BETA TESTERS",    class: "section-testers" },
      };

      /* IntersectionObserver — 섹션·카드 등장 */
      const sectionObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('section-visible'); sectionObs.unobserve(e.target); } });
      }, { threshold: 0.08 });

      const cardObs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); cardObs.unobserve(e.target); } });
      }, { threshold: 0.08 });

      async function loadDevelopers() {
        try {
          const res  = await fetch('./developer/developer.json');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          content.innerHTML = '';
          const groups = data.reduce((acc, dev) => {
            if (!acc[dev.type]) acc[dev.type] = [];
            acc[dev.type].push(dev);
            return acc;
          }, {});

          Object.keys(CATEGORIES).forEach((type, si) => {
            if (!groups[type]) return;
            const cfg     = CATEGORIES[type];
            const section = document.createElement('section');
            section.className = `dev-section ${cfg.class}`;
            section.innerHTML = `
              <div class="section-header">
                <span class="section-icon">${cfg.icon}</span>
                <h2 class="section-title">${cfg.title}</h2>
                <span class="section-count">${groups[type].length}</span>
              </div>
              <div class="dev-grid"></div>`;

            const grid = section.querySelector('.dev-grid');
            groups[type].forEach((dev, i) => {
              const card = document.createElement('article');
              card.className = 'card dev-card';
              card.style.transitionDelay = (i * 70) + 'ms';
              card.innerHTML = `
                <div class="card-top-bar"></div>
                <div class="dev-avatar-wrap">
                  <img class="dev-avatar"
                    src="https://mc-heads.net/avatar/${encodeURIComponent(dev.mc_id)}/100"
                    alt="${dev.name}" loading="lazy"
                    onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230b1220%22/><text x=%2250%22 y=%2260%22 text-anchor=%22middle%22 fill=%22%2322c55e%22 font-size=%2240%22>?</text></svg>'">
                </div>
                <h3 class="dev-name">${dev.name}</h3>
                <p class="dev-role">${dev.role}</p>
                <p class="dev-desc">${dev.desc}</p>
                <div class="dev-tags">${dev.tags.map(t => `<span class="dev-tag">${t}</span>`).join('')}</div>`;
              grid.appendChild(card);
              cardObs.observe(card);
            });

            content.appendChild(section);
            /* 약간 딜레이 후 섹션 관찰 시작 */
            requestAnimationFrame(() => sectionObs.observe(section));
          });
        } catch (e) {
          content.innerHTML = `<div style="color:var(--red);text-align:center;padding:40px;">⚠️ ERROR: ${e.message}</div>`;
        }
      }

      document.addEventListener('DOMContentLoaded', loadDevelopers);
    })();
  </script>
</body>
</html>
